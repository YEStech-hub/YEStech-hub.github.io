<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f7f2eb">
  <title>선물 후보</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap");

    :root {
      --ink: #282520;
      --muted: #726d66;
      --paper: #fffdf9;
      --cream: #f7f2eb;
      --line: #e6ded4;
      --accent: #dd6f55;
      --accent-soft: #fce9e1;
      --shadow: 0 14px 34px rgba(91, 73, 58, 0.13);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--cream);
      font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      word-break: keep-all;
    }

    body.modal-open {
      overflow: hidden;
    }

    button {
      font: inherit;
    }

    .wrap {
      width: min(100% - 32px, 920px);
      margin: 0 auto;
    }

    .hero {
      padding: 62px 0 42px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-family: "DM Serif Display", "Noto Sans KR", serif;
      font-size: clamp(46px, 8vw, 68px);
      font-weight: 400;
      letter-spacing: -0.06em;
      line-height: 1;
    }

    section {
      margin-bottom: 52px;
    }

    .section-head {
      margin-bottom: 18px;
    }

    h2 {
      margin: 0;
      font-size: 23px;
      letter-spacing: -0.055em;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .product-card {
      position: relative;
      display: block;
      overflow: hidden;
      width: 100%;
      padding: 0;
      border: 2px solid transparent;
      border-radius: 20px;
      color: inherit;
      background: var(--paper);
      box-shadow: 0 6px 16px rgba(91, 73, 58, 0.06);
      cursor: pointer;
      text-align: left;
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .product-card:hover,
    .product-card:focus-visible {
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }

    .product-card.selected {
      border-color: var(--accent);
      box-shadow: 0 12px 28px rgba(221, 111, 85, 0.2);
    }

    .card-photo {
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: #f8f8f8;
    }

    .card-photo img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 180ms ease;
    }

    .product-card:hover .card-photo img {
      transform: scale(1.025);
    }

    .card-body {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 14px 15px;
    }

    .card-label strong,
    .card-label small {
      display: block;
    }

    .card-label strong {
      font-size: 15px;
      letter-spacing: -0.04em;
    }

    .card-label small {
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
    }

    .card-mark {
      display: grid;
      flex: 0 0 auto;
      width: 24px;
      height: 24px;
      place-items: center;
      border: 1.5px solid #cfc7bd;
      border-radius: 50%;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
    }

    .product-card.selected .card-mark {
      border-color: var(--accent);
      color: white;
      background: var(--accent);
    }

    .result {
      position: sticky;
      bottom: 14px;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin: 0 auto 20px;
      padding: 14px 16px;
      border: 1px solid rgba(221, 111, 85, 0.28);
      border-radius: 18px;
      background: rgba(255, 253, 249, 0.94);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .result small,
    .result strong {
      display: block;
    }

    .result small {
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 11px;
    }

    .result strong {
      font-size: 14px;
      letter-spacing: -0.04em;
    }

    .action {
      flex: 0 0 auto;
      padding: 10px 14px;
      border: 0;
      border-radius: 999px;
      color: white;
      background: var(--accent);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .action:disabled {
      cursor: not-allowed;
      opacity: 0.42;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      background: rgba(40, 37, 32, 0.62);
      overflow-y: auto;
    }

    .modal.open {
      display: block;
    }

    .modal-panel {
      width: min(100% - 24px, 860px);
      margin: 20px auto;
      overflow: hidden;
      border-radius: 22px;
      background: var(--paper);
      box-shadow: 0 22px 60px rgba(40, 37, 32, 0.28);
    }

    .modal-head {
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 253, 249, 0.94);
      backdrop-filter: blur(16px);
    }

    .modal-head h3 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -0.045em;
    }

    .close {
      display: grid;
      flex: 0 0 auto;
      width: 34px;
      height: 34px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 50%;
      color: var(--ink);
      background: white;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
    }

    .modal-content {
      padding: 18px;
    }

    .modal-content h4 {
      margin: 4px 0 12px;
      font-size: 15px;
      letter-spacing: -0.04em;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 28px;
    }

    .gallery img {
      display: block;
      width: 100%;
      border-radius: 12px;
      background: #f8f8f8;
    }

    .description-images {
      overflow: hidden;
      border-radius: 12px;
      background: #f8f8f8;
    }

    .description-images picture,
    .description-images img {
      display: block;
      width: 100%;
    }

    .modal-actions {
      position: sticky;
      bottom: 0;
      z-index: 1;
      padding: 14px 18px;
      border-top: 1px solid var(--line);
      background: rgba(255, 253, 249, 0.94);
      backdrop-filter: blur(16px);
    }

    .modal-actions .action {
      width: 100%;
      padding: 13px 16px;
      font-size: 14px;
    }

    @media (min-width: 720px) {
      .wallet-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .wrap {
        width: min(100% - 24px, 920px);
      }

      .hero {
        padding: 48px 0 32px;
      }

      section {
        margin-bottom: 42px;
      }

      .card-body {
        padding: 12px;
      }

      .card-label strong {
        font-size: 14px;
      }

      .modal-panel {
        width: 100%;
        min-height: 100%;
        margin: 0;
        border-radius: 0;
      }

      .modal-content {
        padding: 12px;
      }
    }
  </style>
</head>

      `;
      card.addEventListener("click", () => openModal(product));
      return card;
    }

    function openModal(product) {
      activeProduct = product;
      modalTitle.textContent = product.name;
      gallery.innerHTML = product.images
        .map((image, index) => `<img src="${image}" alt="${product.name} 제품 사진 ${index + 1}" loading="lazy">`)
        .join("");
      descriptionImages.innerHTML = product.details
        .map((image, index) => `
          <picture>
            <source media="(max-width: 600px)" srcset="${image.mobile}">
            <img src="${image.desktop}" alt="${product.name} 제품 설명 ${index + 1}" loading="lazy">
          </picture>
        `)
        .join("");
      selectProduct.textContent = document.querySelector(`[data-product-id="${product.id}"]`).classList.contains("selected")
        ? "선택 완료"
        : "이 제품 선택";
      modal.classList.add("open");
      document.body.classList.add("modal-open");
      document.getElementById("closeModal").focus();
    }

    function closeModal() {
      modal.classList.remove("open");
      document.body.classList.remove("modal-open");
    }

    function chooseProduct() {
      document.querySelectorAll(".product-card").forEach((card) => {
        card.classList.toggle("selected", card.dataset.productId === activeProduct.id);
        card.querySelector(".card-mark").textContent = card.dataset.productId === activeProduct.id ? "✓" : "+";
      });
      selectedGift.textContent = activeProduct.name;
      copyButton.disabled = false;
      copyButton.textContent = "선택 복사";
      closeModal();
    }

    async function copySelection() {
      const message = `생일선물은 "${selectedGift.textContent}"으로 골랐어!`;
      let copied = false;

      if (navigator.clipboard) {
        try {
          await navigator.clipboard.writeText(message);
          copied = true;
        } catch {}
      }

      if (!copied) {
        const textArea = document.createElement("textarea");
        textArea.value = message;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand("copy");
        textArea.remove();
      }

      copyButton.textContent = "복사 완료";
    }

    products.forEach((product) => {
      const grid = product.type === "wallet" ? walletGrid : ringGrid;
      grid.appendChild(createCard(product));
    });

    document.getElementById("closeModal").addEventListener("click", closeModal);
    selectProduct.addEventListener("click", chooseProduct);
    copyButton.addEventListener("click", copySelection);
    modal.addEventListener("click", (event) => {
      if (event.target === modal) closeModal();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeModal();
    });
  </script>
</body>
</html>
